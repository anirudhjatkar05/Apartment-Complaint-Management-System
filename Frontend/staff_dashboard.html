<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="bg-orb-3"></div>
    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon" style="font-size: 2.5rem;">🛠️</div>
                    <h1 style="font-size: 1.2rem;">Staff Portal</h1>
                </div>
            </div>
            <nav class="sidebar-menu">
                <a href="#" onclick="window.scrollTo(0, 0); return false;" class="menu-item active">
                    <span class="icon">🔧</span> My Tasks
                </a>
                <a href="#complaintsList" class="menu-item">
                    <span class="icon">✅</span> Completed
                </a>
                <div style="margin-top: auto; padding-bottom: 30px;">
                    <a href="#" onclick="logout()" class="menu-item" style="color: var(--danger);">
                        <span class="icon">🚪</span> Sign Out
                    </a>
                </div>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
                <div>
                    <h2 style="font-size: 2rem; font-weight: 800;">Technician Dashboard</h2>
                    <p style="color: var(--text-secondary);">Your daily assignment and maintenance schedule.</p>
                </div>
                <div class="user-profile" style="display: flex; align-items: center; gap: 15px; background: var(--glass-bg); padding: 10px 20px; border-radius: 50px; border: 1px solid var(--glass-border);">
                    <div style="width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, var(--accent-primary), var(--accent-tertiary)); display: flex; align-items: center; justify-content: center; font-weight: 800; color: #fff;">
                        S
                    </div>
                    <span style="font-weight: 600;" id="userNameDisplay">Staff</span>
                </div>
            </header>

            <!-- Stats Grid -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon" style="background: rgba(79, 70, 229, 0.1); color: var(--accent-tertiary);">📋</div>
                    <div class="stat-info">
                        <span class="value" id="totalTasks">0</span>
                        <span class="label">Assigned Tasks</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" style="background: rgba(245, 158, 11, 0.1); color: var(--pending);">🚧</div>
                    <div class="stat-info">
                        <span class="value" id="activeTasks">0</span>
                        <span class="label">In Progress</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" style="background: rgba(16, 185, 129, 0.1); color: var(--success);">🎯</div>
                    <div class="stat-info">
                        <span class="value" id="doneTasks">0</span>
                        <span class="label">Completed Today</span>
                    </div>
                </div>
            </div>

            <div class="card" style="max-width: 1000px;">
                <h3 class="card-title">Priority Maintenance List</h3>
                <div id="complaintsList">
                    <!-- Complaints will be injected here via JS -->
                </div>
            </div>
        </main>
    </div>

    <script src="js/app.js"></script>
    <script>
        const user = requireAuth('STAFF');
        if (user) {
            document.getElementById('userNameDisplay').textContent = user.name;
            renderComplaints();
        }

        async function renderComplaints() {
            const list = document.getElementById('complaintsList');
            const complaints = await getStaffComplaints(user.id);
            
            // Update Stats
            document.getElementById('totalTasks').textContent = complaints.length;
            document.getElementById('activeTasks').textContent = complaints.filter(c => c.status === 'In Progress' || c.status === 'IN_PROGRESS').length;
            document.getElementById('doneTasks').textContent = complaints.filter(c => c.status === 'Resolved' || c.status === 'RESOLVED').length;

            if (complaints.length === 0) {
                list.innerHTML = `
                    <div style="text-align: center; padding: 60px; color: var(--text-secondary);">
                        <div style="font-size: 4rem; margin-bottom: 20px;">☕</div>
                        <h3>No active tasks!</h3>
                        <p>Enjoy your break, or check back later for new assignments.</p>
                    </div>
                `;
                return;
            }

            list.innerHTML = complaints.map(c => `
                <div class="complaint-item">
                    <div class="complaint-header">
                        <div>
                            <span class="complaint-title">${c.title}</span>
                            <div class="complaint-meta" style="margin-top: 5px;">
                                Resident: <span style="color: var(--accent-primary);">@${c.user ? c.user.name : 'Unknown'}</span> • ${formatDate(c.createdAt)}
                            </div>
                        </div>
                        <span class="badge ${getStatusBadgeClass(c.status)}">${c.status}</span>
                    </div>
                    <p class="complaint-desc" style="margin: 20px 0;">${c.description}</p>
                    
                    ${c.imageBase64 ? `<div style="margin-bottom: 20px;">
                        <img src="${c.imageBase64}" style="width: 100%; max-height: 250px; object-fit: cover; border-radius: 12px; border: 1px solid var(--glass-border);"/>
                    </div>` : ''}

                    <form onsubmit="handleStaffUpdate(event, '${c.id}')" style="background: rgba(0,0,0,0.2); border-radius: 16px; padding: 20px; border: 1px solid var(--glass-border);">
                        <label style="font-size: 0.8rem; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; display: block; margin-bottom: 10px;">Update Job Progress</label>
                        <textarea id="note-${c.id}" class="form-control" placeholder="Describe what you've done so far..." rows="2" style="margin-bottom: 15px;">${c.staffProgressNote || ''}</textarea>
                        
                        <div style="display: flex; gap: 10px;">
                            <select id="status-${c.id}" class="form-control" style="flex: 1; padding: 12px;">
                                <option value="Pending"     ${c.status === 'Pending' || c.status === 'PENDING' ? 'selected' : ''}>Pending</option>
                                <option value="In Progress" ${c.status === 'In Progress' || c.status === 'IN_PROGRESS' ? 'selected' : ''}>In Progress</option>
                                <option value="Resolved"    ${c.status === 'Resolved' || c.status === 'RESOLVED' ? 'selected' : ''}>Mark as Resolved</option>
                            </select>
                            <button type="submit" class="btn-primary" style="width: auto; padding: 12px 30px;">Save Update</button>
                        </div>
                    </form>
                </div>
            `).reverse().join('');
        }

        async function handleStaffUpdate(event, complaintId) {
            event.preventDefault();
            const status = document.getElementById(`status-${complaintId}`).value;
            const note   = document.getElementById(`note-${complaintId}`).value;
            if (await staffUpdateComplaint(complaintId, status, note)) {
                renderComplaints();
            }
        }
    </script>
</body>
</html>
