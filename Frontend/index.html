<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apartment Complaints - Smart Living</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-page">
        <!-- Hero Section -->
        <div class="auth-hero" style="flex: 1;">
            <div class="hero-content" style="max-width: 800px;">
                <div class="logo-icon" style="font-size: 5rem; margin-bottom: 20px;">🏢</div>
                <h1 style="font-size: 4rem; margin-bottom: 20px; line-height: 1;">Apartment Complaints <br><span style="color: var(--accent-primary);">Management System</span></h1>
                <p style="font-size: 1.5rem; margin-bottom: 40px; color: rgba(255,255,255,0.7);">The most advanced, glassmorphic solution for modern residential living. Report issues, track progress, and stay connected with your building management in real-time.</p>
                
                <div style="display: flex; gap: 20px; justify-content: center;">
                    <a href="login.html" class="btn-primary" style="width: auto; padding: 18px 40px; text-decoration: none;">
                        <span>Get Started</span>
                        <span class="arrow">→</span>
                    </a>
                    <a href="register.html" class="btn-ghost" style="width: auto; padding: 18px 40px; border-radius: 14px; font-weight: 700; color: #fff; border: 1px solid var(--glass-border); display: flex; align-items: center; justify-content: center;">
                        Create Account
                    </a>
                </div>

                <div class="hero-stats" style="margin-top: 60px;">
                    <div class="stat-item">
                        <span class="value">99%</span>
                        <span class="label">Satisfaction</span>
                    </div>
                    <div class="stat-item" style="border-left: 1px solid var(--glass-border); border-right: 1px solid var(--glass-border); padding: 0 40px;">
                        <span class="value">24h</span>
                        <span class="label">Turnaround</span>
                    </div>
                    <div class="stat-item">
                        <span class="value">Active</span>
                        <span class="label">Support</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
