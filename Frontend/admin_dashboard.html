<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="bg-orb-3"></div>
    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon" style="font-size: 2.5rem;">⚙️</div>
                    <h1 style="font-size: 1.2rem;">Admin Panel</h1>
                </div>
            </div>
            <nav class="sidebar-menu">
                <a href="#" onclick="window.scrollTo(0, 0); return false;" class="menu-item active">
                    <span class="icon">📊</span> Overview
                </a>
                <a href="#" onclick="alert('Staff management page is under construction!'); return false;" class="menu-item">
                    <span class="icon">👥</span> Manage Staff
                </a>
                <a href="#" onclick="alert('Departments page is under construction!'); return false;" class="menu-item">
                    <span class="icon">🏢</span> Departments
                </a>
                <div style="margin-top: auto; padding-bottom: 30px;">
                    <a href="#" onclick="logout()" class="menu-item" style="color: var(--danger);">
                        <span class="icon">🚪</span> Sign Out
                    </a>
                </div>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
                <div>
                    <h2 style="font-size: 2rem; font-weight: 800;">Admin Dashboard</h2>
                    <p style="color: var(--text-secondary);">Global oversight of all building operations and maintenance.</p>
                </div>
                <div class="user-profile" style="display: flex; align-items: center; gap: 15px; background: var(--glass-bg); padding: 10px 20px; border-radius: 50px; border: 1px solid var(--glass-border);">
                    <div style="width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, var(--accent-secondary), var(--accent-tertiary)); display: flex; align-items: center; justify-content: center; font-weight: 800; color: #fff;">
                        A
                    </div>
                    <span style="font-weight: 600;" id="userNameDisplay">Admin</span>
                </div>
            </header>

            <!-- Stats Grid -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon" style="background: rgba(79, 70, 229, 0.1); color: var(--accent-tertiary);">📁</div>
                    <div class="stat-info">
                        <span class="value" id="totalCount">0</span>
                        <span class="label">Total Complaints</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" style="background: rgba(245, 158, 11, 0.1); color: var(--pending);">⏳</div>
                    <div class="stat-info">
                        <span class="value" id="pendingCount">0</span>
                        <span class="label">Pending Action</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" style="background: rgba(16, 185, 129, 0.1); color: var(--success);">✅</div>
                    <div class="stat-info">
                        <span class="value" id="resolvedCount">0</span>
                        <span class="label">Fully Resolved</span>
                    </div>
                </div>
            </div>

            <div class="card" style="max-width: 1000px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                    <h3 class="card-title" style="margin-bottom: 0;">Operational Complaints</h3>
                    <div style="display: flex; gap: 10px;">
                        <button class="btn-ghost" style="padding: 8px 15px; width: auto; font-size: 0.85rem;">Filter</button>
                        <button class="btn-ghost" style="padding: 8px 15px; width: auto; font-size: 0.85rem;">Export</button>
                    </div>
                </div>
                <div id="complaintsList">
                    <!-- Complaints will be injected here via JS -->
                </div>
            </div>
        </main>
    </div>

    <script src="js/app.js"></script>
    <script>
        const user = requireAuth('ADMIN');
        let allStaff = [];

        if (user) {
            document.getElementById('userNameDisplay').textContent = user.name;
            initAdmin();
        }

        async function initAdmin() {
            allStaff = await getAllStaffMembers();
            renderComplaints();
        }

        async function renderComplaints() {
            const list = document.getElementById('complaintsList');
            const complaints = await getAllComplaints();
            
            // Update Stats
            document.getElementById('totalCount').textContent = complaints.length;
            document.getElementById('pendingCount').textContent = complaints.filter(c => c.status === 'Pending' || c.status === 'PENDING').length;
            document.getElementById('resolvedCount').textContent = complaints.filter(c => c.status === 'Resolved' || c.status === 'RESOLVED').length;

            if (complaints.length === 0) {
                list.innerHTML = `
                    <div style="text-align: center; padding: 60px; color: var(--text-secondary);">
                        <div style="font-size: 4rem; margin-bottom: 20px;">🎉</div>
                        <h3>All clear!</h3>
                        <p>There are no complaints in the system right now.</p>
                    </div>
                `;
                return;
            }

            list.innerHTML = complaints.map(c => {
                const assignedStaffNames = c.assignedStaff 
                    ? c.assignedStaff.name 
                    : 'Unassigned';

                let staffOptions = allStaff.map(s => {
                    const isSelected = c.assignedStaff && c.assignedStaff.id === s.id;
                    return `<option value="${s.id}" ${isSelected ? 'selected' : ''}>${s.name}</option>`;
                }).join('');

                return `
                <div class="complaint-item">
                    <div class="complaint-header">
                        <div>
                            <span class="complaint-title">${c.title}</span>
                            <div class="complaint-meta" style="margin-top: 5px;">
                                <span style="color: var(--accent-primary);">@${c.user ? c.user.name : 'Unknown'}</span> • ${formatDate(c.createdAt)}
                            </div>
                        </div>
                        <span class="badge ${getStatusBadgeClass(c.status)}">${c.status}</span>
                    </div>
                    <p class="complaint-desc" style="margin: 20px 0;">${c.description}</p>
                    
                    ${c.imageBase64 ? `<div style="margin-bottom: 20px;">
                        <img src="${c.imageBase64}" style="width: 100%; max-height: 300px; object-fit: cover; border-radius: 14px; border: 1px solid var(--glass-border); cursor: pointer;" onclick="window.open(this.src)"/>
                    </div>` : ''}

                    <div style="background: rgba(0,0,0,0.2); border-radius: 16px; padding: 20px; border: 1px solid var(--glass-border);">
                        <div class="grid" style="grid-template-columns: 1fr 1fr; gap: 20px;">
                            <div>
                                <label style="font-size: 0.8rem; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; display: block; margin-bottom: 10px;">Assign Personnel</label>
                                <div style="display: flex; gap: 10px;">
                                    <select id="assign-${c.id}" class="form-control" style="flex: 1; padding: 10px;">
                                        <option value="">Select Staff...</option>
                                        ${staffOptions}
                                    </select>
                                    <button onclick="handleAssignStaff('${c.id}')" class="btn-primary" style="width: auto; padding: 10px 20px; font-size: 0.9rem;">Assign</button>
                                </div>
                            </div>
                            <div>
                                <label style="font-size: 0.8rem; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; display: block; margin-bottom: 10px;">Status Control</label>
                                <div style="display: flex; gap: 10px;">
                                    <select id="status-${c.id}" class="form-control" style="flex: 1; padding: 10px;">
                                        <option value="Pending"     ${c.status === 'Pending' || c.status === 'PENDING' ? 'selected' : ''}>Pending</option>
                                        <option value="In Progress" ${c.status === 'In Progress' || c.status === 'IN_PROGRESS' ? 'selected' : ''}>In Progress</option>
                                        <option value="Resolved"    ${c.status === 'Resolved' || c.status === 'RESOLVED' ? 'selected' : ''}>Resolved</option>
                                    </select>
                                    <button onclick="handleStatusUpdate(event, '${c.id}')" class="btn-primary" style="width: auto; padding: 10px 20px; font-size: 0.9rem; background: var(--accent-tertiary);">Update</button>
                                </div>
                            </div>
                        </div>
                        <div style="margin-top: 15px;">
                            <label style="font-size: 0.8rem; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; display: block; margin-bottom: 5px;">Admin Resolution Note</label>
                            <input type="text" id="comment-${c.id}" class="form-control" placeholder="Type a message for the resident..." value="${c.adminComment || ''}" style="padding: 12px;">
                        </div>
                    </div>
                </div>
            `;
            }).reverse().join('');
        }

        async function handleAssignStaff(complaintId) {
            const staffId = document.getElementById(`assign-${complaintId}`).value;
            if (!staffId) return alert('Please select a staff member.');
            
            if (await assignStaffToComplaint(complaintId, staffId)) {
                renderComplaints();
            }
        }

        async function handleStatusUpdate(event, complaintId) {
            event.preventDefault();
            const status = document.getElementById(`status-${complaintId}`).value;
            const comment = document.getElementById(`comment-${complaintId}`).value;
            if (await updateComplaintStatus(complaintId, status, comment)) {
                renderComplaints();
            }
        }
    </script>
</body>
</html>
