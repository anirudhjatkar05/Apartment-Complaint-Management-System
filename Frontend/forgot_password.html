<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Apartment Complaints</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="bg-orb-3"></div>
    
    <div class="auth-page">
        <!-- Right: Auth Form Section (Centered for forgot password) -->
        <div class="auth-main" style="flex: 1;">
            <div class="card auth-card" style="max-width: 480px;">
                <!-- Logo -->
                <div class="logo">
                    <div class="logo-icon">🔑</div>
                    <h1>Reset Password</h1>
                    <p>We'll help you get back into your account</p>
                </div>

                <div id="alert-msg" class="alert" style="display: none;"></div>

                <!-- Form 1: Request OTP -->
                <form id="resetForm">
                    <div class="form-group">
                        <input type="email" id="email" placeholder=" " required autocomplete="email">
                        <label for="email">Email Address</label>
                    </div>

                    <button type="submit" class="btn-primary" id="sendBtn">
                        <span>Send Reset Instructions</span>
                        <span class="arrow">→</span>
                    </button>
                </form>

                <!-- Form 2: Verify OTP and Reset (Hidden initially) -->
                <form id="verifyForm" style="display: none;">
                    <div class="form-group">
                        <input type="text" id="otp" placeholder=" " required autocomplete="off">
                        <label for="otp">Enter 6-digit OTP</label>
                    </div>
                    <div class="form-group">
                        <input type="password" id="newPassword" placeholder=" " required autocomplete="new-password">
                        <label for="newPassword">New Password</label>
                    </div>

                    <button type="submit" class="btn-primary" id="verifyBtn">
                        <span>Reset Password</span>
                        <span class="arrow">→</span>
                    </button>
                </form>

                <div class="divider">
                    <div class="divider-line"></div>
                    <div class="divider-text">OR</div>
                    <div class="divider-line"></div>
                </div>
                
                <div class="footer-link">
                    Remember your password? <a href="login.html">Sign In</a>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        const resetForm = document.getElementById('resetForm');
        const verifyForm = document.getElementById('verifyForm');
        const emailInput = document.getElementById('email');
        const alertMsg = document.getElementById('alert-msg');
        let currentEmail = '';

        function showAlert(msg, isSuccess) {
            alertMsg.textContent = msg;
            alertMsg.className = 'alert ' + (isSuccess ? 'alert-success' : 'alert-danger');
            alertMsg.style.display = 'block';
            alertMsg.classList.add('show');
        }

        resetForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('sendBtn');
            const originalContent = btn.innerHTML;
            
            const email = emailInput.value.trim();
            if(!email) return;

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Sending...';
            alertMsg.style.display = 'none';

            const res = await forgotPassword(email);
            
            btn.disabled = false;
            btn.innerHTML = originalContent;

            if (res && res.success) {
                currentEmail = email;
                showAlert('OTP sent to your email! Please check your inbox.', true);
                resetForm.style.display = 'none';
                verifyForm.style.display = 'block';
            } else {
                showAlert(res ? res.message : 'An error occurred.', false);
            }
        });

        verifyForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('verifyBtn');
            const originalContent = btn.innerHTML;
            
            const otp = document.getElementById('otp').value.trim();
            const newPassword = document.getElementById('newPassword').value;

            if(!otp || !newPassword) return;

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Verifying...';
            alertMsg.style.display = 'none';

            const res = await resetPassword(currentEmail, otp, newPassword);
            
            btn.disabled = false;
            btn.innerHTML = originalContent;

            if (res && res.success) {
                showAlert('Password reset successfully! Redirecting...', true);
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            } else {
                showAlert(res ? res.message : 'Invalid OTP or error.', false);
            }
        });
    </script>
</body>
</html>
